services: 
    Gally\GraphQl\Decoration\Resolver\Stage\ReadStage:
        decorates: api_platform.graphql.state_provider.read
        arguments:
            - '@.inner'

    Gally\GraphQl\Decoration\Serializer\SerializerContextBuilder:
        decorates: api_platform.graphql.serializer.context_builder
        arguments:
            - '%api_platform.graphql.nesting_separator%'
            - '@.inner'

    Gally\GraphQl\Decoration\Type\RenameGraphQlQuery:
        decorates: api_platform.graphql.fields_builder
        arguments:
            - '@Gally\Configuration\Service\ConfigurationManager'
            - '@.inner'
                
    Gally\GraphQl\Error\ErrorHandler:
        decorates: api_platform.graphql.error_handler
        arguments:
            - '@logger'
            - '@.inner'
    # Override api-platform SchemaBuilder to restrict schema building to Gally resources only (perf optimization).
    api_platform.graphql.schema_builder:
        class: Gally\GraphQl\Decoration\Type\SchemaBuilder
        arguments:
            - '@api_platform.metadata.resource.name_collection_factory'
            - '@api_platform.metadata.resource.metadata_collection_factory'
            - '@api_platform.graphql.types_factory'
            - '@api_platform.graphql.types_container'
            - '@api_platform.graphql.fields_builder'
            - '@Gally\Configuration\Service\ConfigurationManager'
