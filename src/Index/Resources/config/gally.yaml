gally:
    indices_settings:
        prefix: gally
        timestamp_pattern: "{{Ymd}}_{{His}}"
        number_of_shards: 1
        number_of_replicas: 0
        time_before_ghost: 3600
    ism_settings: 
        rollover_after: 30
        delete_after: 365
    graphql_excluded_resources:
        Gally\Index\Entity\DataStream: ~
        Gally\Index\Entity\Index\Mapping\Status: ~
        Gally\Index\Entity\Index\SelfReindex: ~